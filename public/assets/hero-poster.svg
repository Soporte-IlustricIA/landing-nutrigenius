<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glow" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1b4a34"/>
      <stop offset="55%" stop-color="#0f2a1e"/>
      <stop offset="100%" stop-color="#07160f"/>
    </radialGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7bd389" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffd27a" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <g filter="url(#soft)" opacity="0.9">
    <circle cx="1480" cy="300" r="260" fill="#7bd389" opacity="0.35"/>
    <circle cx="380" cy="820" r="320" fill="#ffd27a" opacity="0.28"/>
    <circle cx="980" cy="540" r="200" fill="#c9ffd8" opacity="0.18"/>
  </g>
  <rect width="1920" height="1080" fill="url(#warm)"/>
</svg>
